version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=your-secret-key-here
      - HOURLY_POWER_CONSUMPTION=0.5
      - ELECTRICITY_PRICE=0.6
    volumes:
      - app-data:/app/data
      - app-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  app-data:
    driver: local
  app-uploads:
    driver: local